<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" role="img" aria-label="R to Python and Rust port diagram">
  <!-- R box -->
  <g transform="translate(8, 22)">
    <rect width="38" height="36" rx="6" fill="#ffffff" stroke="#c2d4c8"/>
    <text x="19" y="22" font-family="Inter, sans-serif" font-size="14" font-weight="800" fill="#0d1f17" text-anchor="middle">R</text>
  </g>
  <text x="27" y="14" font-family="IBM Plex Mono, monospace" font-size="8" fill="#6b7a73" text-anchor="middle">trusted</text>

  <!-- arrow -->
  <g stroke="#1f7a36" stroke-width="1.4" fill="none">
    <line x1="54" y1="40" x2="98" y2="40" stroke-dasharray="3 3"/>
    <polygon points="98,37 104,40 98,43" fill="#1f7a36" stroke="none"/>
  </g>
  <text x="78" y="32" font-family="IBM Plex Mono, monospace" font-size="8" fill="#1f7a36" text-anchor="middle">port</text>

  <!-- Py box -->
  <g transform="translate(112, 8)">
    <rect width="40" height="32" rx="6" fill="#1f7a36"/>
    <text x="20" y="20" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">Py</text>
  </g>
  <!-- Rs box -->
  <g transform="translate(112, 44)">
    <rect width="40" height="28" rx="6" fill="#ffffff" stroke="#1f7a36" stroke-width="1.4"/>
    <text x="20" y="19" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#1f7a36" text-anchor="middle">Rs</text>
  </g>

  <!-- AnnData hint -->
  <g transform="translate(162, 28)" fill="none" stroke="#4ea846" stroke-width="1.2">
    <rect x="0" y="0" width="28" height="24" rx="4"/>
    <line x1="0" y1="8" x2="28" y2="8"/>
    <line x1="10" y1="8" x2="10" y2="24"/>
  </g>
  <text x="176" y="68" font-family="IBM Plex Mono, monospace" font-size="7" fill="#6b7a73" text-anchor="middle">AnnData</text>
</svg>
