<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" role="img" aria-label="Parity benchmark validation">
  <!-- frame -->
  <g transform="translate(8, 8)">
    <rect width="184" height="64" rx="8" fill="#ffffff" stroke="#e1ebe4"/>
    <text x="10" y="14" font-family="IBM Plex Mono, monospace" font-size="8" fill="#6b7a73">PARITY · BENCHMARK</text>
    <line x1="10" y1="20" x2="174" y2="20" stroke="#e1ebe4"/>

    <!-- bars: R baseline (light) vs Py port (dark) -->
    <g transform="translate(14, 26)">
      <!-- baseline group -->
      <text x="0" y="32" font-family="IBM Plex Mono, monospace" font-size="7" fill="#6b7a73">R</text>
      <text x="56" y="32" font-family="IBM Plex Mono, monospace" font-size="7" fill="#6b7a73">Py</text>
      <text x="112" y="32" font-family="IBM Plex Mono, monospace" font-size="7" fill="#6b7a73">Rs</text>

      <rect x="0" y="2" width="14" height="22" fill="#c9e7be"/>
      <rect x="16" y="0" width="14" height="24" fill="#1f7a36"/>

      <rect x="56" y="4" width="14" height="20" fill="#c9e7be"/>
      <rect x="72" y="2" width="14" height="22" fill="#1f7a36"/>

      <rect x="112" y="6" width="14" height="18" fill="#c9e7be"/>
      <rect x="128" y="4" width="14" height="20" fill="#1f7a36"/>
    </g>

    <!-- check mark -->
    <g transform="translate(154, 36)">
      <circle r="10" fill="#1f7a36"/>
      <path d="M -4 0 L -1 3 L 4 -3" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
