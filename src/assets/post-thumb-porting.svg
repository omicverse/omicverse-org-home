<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img" aria-label="Porting R methods pipeline thumbnail">
  <defs>
    <linearGradient id="port-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1f7ee"/>
      <stop offset="1" stop-color="#fbfdf9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#port-bg)"/>

  <!-- backdrop dots -->
  <g fill="#1f7a36" opacity="0.1">
    <circle cx="20" cy="22" r="1.4"/><circle cx="380" cy="22" r="1.4"/>
    <circle cx="20" cy="178" r="1.4"/><circle cx="380" cy="178" r="1.4"/>
  </g>

  <!-- R box -->
  <g transform="translate(34, 76)">
    <rect width="56" height="48" rx="8" fill="#ffffff" stroke="#c2d4c8"/>
    <text x="28" y="30" font-family="Inter, sans-serif" font-size="22" font-weight="800" fill="#0d1f17" text-anchor="middle">R</text>
    <text x="28" y="44" font-family="IBM Plex Mono, monospace" font-size="7" fill="#6b7a73" text-anchor="middle">source</text>
  </g>

  <!-- arrow with "port" label -->
  <g transform="translate(98, 100)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#1f7a36" stroke-width="1.4" stroke-dasharray="4 4"/>
    <polygon points="50,-3 56,0 50,3" fill="#1f7a36"/>
    <text x="25" y="-10" font-family="IBM Plex Mono, monospace" font-size="9" fill="#1f7a36" text-anchor="middle">port</text>
  </g>

  <!-- Py + Rs stacked -->
  <g transform="translate(166, 60)">
    <rect width="56" height="36" rx="8" fill="#1f7a36"/>
    <text x="28" y="22" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Python</text>
  </g>
  <g transform="translate(166, 104)">
    <rect width="56" height="36" rx="8" fill="#ffffff" stroke="#1f7a36" stroke-width="1.4"/>
    <text x="28" y="22" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1f7a36" text-anchor="middle">Rust</text>
  </g>

  <!-- arrow -->
  <g transform="translate(228, 100)">
    <line x1="0" y1="0" x2="36" y2="0" stroke="#1f7a36" stroke-width="1.4" stroke-dasharray="4 4"/>
    <polygon points="36,-3 42,0 36,3" fill="#1f7a36"/>
    <text x="20" y="-10" font-family="IBM Plex Mono, monospace" font-size="9" fill="#1f7a36" text-anchor="middle">parity</text>
  </g>

  <!-- benchmark mini chart -->
  <g transform="translate(280, 58)">
    <rect width="86" height="84" rx="8" fill="#ffffff" stroke="#e1ebe4"/>
    <text x="8" y="14" font-family="IBM Plex Mono, monospace" font-size="8" fill="#6b7a73">BENCHMARK</text>
    <line x1="8" y1="20" x2="78" y2="20" stroke="#e1ebe4"/>
    <g transform="translate(12, 30)">
      <rect x="0" y="14" width="10" height="34" fill="#c9e7be"/>
      <rect x="14" y="8" width="10" height="40" fill="#1f7a36"/>
      <rect x="32" y="20" width="10" height="28" fill="#c9e7be"/>
      <rect x="46" y="12" width="10" height="36" fill="#1f7a36"/>
      <rect x="64" y="6" width="10" height="42" fill="#4ea846"/>
    </g>
    <line x1="8" y1="78" x2="78" y2="78" stroke="#e1ebe4"/>
  </g>

  <!-- check badge -->
  <g transform="translate(370, 50)">
    <circle r="14" fill="#1f7a36"/>
    <path d="M -5 0 L -1 4 L 5 -4" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
