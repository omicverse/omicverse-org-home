<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 140" role="img" aria-label="omicverse-skills agent illustration">
  <!-- backdrop dots -->
  <g fill="#1f7a36" opacity="0.08">
    <circle cx="14" cy="18" r="1.2"/><circle cx="38" cy="18" r="1.2"/>
    <circle cx="306" cy="18" r="1.2"/><circle cx="306" cy="42" r="1.2"/>
  </g>

  <!-- agent task list -->
  <g transform="translate(20, 24)">
    <rect x="0" y="0" width="158" height="96" rx="10" fill="#ffffff" stroke="#e1ebe4"/>
    <text x="10" y="14" font-family="IBM Plex Mono, monospace" font-size="8" fill="#6b7a73" letter-spacing="0.8">AGENT · TASKS</text>
    <line x1="10" y1="22" x2="148" y2="22" stroke="#e1ebe4"/>

    <!-- task lines with checks -->
    <g font-family="IBM Plex Mono, monospace" font-size="9" fill="#0d1f17">
      <g transform="translate(10, 36)">
        <rect width="10" height="10" rx="2" fill="#1f7a36"/>
        <path d="M 2 5 L 4.5 7.5 L 8 3.5" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <text x="16" y="9">load adata</text>
      </g>
      <g transform="translate(10, 52)">
        <rect width="10" height="10" rx="2" fill="#1f7a36"/>
        <path d="M 2 5 L 4.5 7.5 L 8 3.5" stroke="#fff" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <text x="16" y="9">qc · normalize</text>
      </g>
      <g transform="translate(10, 68)">
        <rect width="10" height="10" rx="2" fill="#4ea846"/>
        <circle cx="5" cy="5" r="2" fill="#fff" opacity="0.9"/>
        <text x="16" y="9" fill="#1f7a36" font-weight="600">cluster · annotate</text>
      </g>
      <g transform="translate(10, 84)">
        <rect width="10" height="10" rx="2" fill="#fff" stroke="#c2d4c8"/>
        <text x="16" y="9" fill="#6b7a73">write report</text>
      </g>
    </g>
  </g>

  <!-- arrow -->
  <g stroke="#1f7a36" stroke-width="1.2" fill="none">
    <line x1="186" y1="72" x2="216" y2="72" stroke-dasharray="3 3"/>
    <polygon points="216,69 222,72 216,75" fill="#1f7a36" stroke="none"/>
  </g>

  <!-- right: report card with sparkle -->
  <g transform="translate(228, 24)">
    <rect x="0" y="0" width="78" height="96" rx="10" fill="url(#skills-rep-bg)" stroke="#c2d4c8"/>
    <defs>
      <linearGradient id="skills-rep-bg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffffff"/>
        <stop offset="1" stop-color="#e6f3e1"/>
      </linearGradient>
    </defs>
    <line x1="10" y1="14" x2="58" y2="14" stroke="#c2d4c8" stroke-width="1.5"/>
    <line x1="10" y1="22" x2="68" y2="22" stroke="#c2d4c8"/>
    <line x1="10" y1="30" x2="50" y2="30" stroke="#c2d4c8"/>
    <rect x="10" y="40" width="58" height="22" rx="3" fill="#ffffff" stroke="#c2d4c8"/>
    <!-- mini chart in report -->
    <g transform="translate(14, 44)" fill="#1f7a36">
      <rect x="0" y="10" width="6" height="6"/>
      <rect x="8" y="6" width="6" height="10"/>
      <rect x="16" y="2" width="6" height="14"/>
      <rect x="24" y="8" width="6" height="8"/>
      <rect x="32" y="4" width="6" height="12"/>
      <rect x="40" y="10" width="6" height="6"/>
    </g>
    <line x1="10" y1="70" x2="58" y2="70" stroke="#c2d4c8"/>
    <line x1="10" y1="78" x2="44" y2="78" stroke="#c2d4c8"/>

    <!-- sparkle -->
    <g transform="translate(64, 12)" stroke="#4ea846" stroke-width="1.4" stroke-linecap="round">
      <line x1="0" y1="-6" x2="0" y2="6"/>
      <line x1="-6" y1="0" x2="6" y2="0"/>
      <line x1="-4" y1="-4" x2="4" y2="4"/>
      <line x1="-4" y1="4" x2="4" y2="-4"/>
    </g>
  </g>
</svg>
