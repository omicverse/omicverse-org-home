<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" role="img" aria-label="Agent-ready omics workflow thumbnail">
  <defs>
    <linearGradient id="agent-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f1f7ee"/>
      <stop offset="1" stop-color="#fbfdf9"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#agent-bg)"/>

  <g fill="#1f7a36" opacity="0.1">
    <circle cx="20" cy="22" r="1.4"/><circle cx="380" cy="22" r="1.4"/>
    <circle cx="20" cy="178" r="1.4"/><circle cx="380" cy="178" r="1.4"/>
  </g>

  <!-- agent (left) -->
  <g transform="translate(40, 78)">
    <circle cx="22" cy="22" r="22" fill="#0d1f17"/>
    <circle cx="14" cy="20" r="3" fill="#4ea846"/>
    <circle cx="30" cy="20" r="3" fill="#4ea846"/>
    <line x1="14" y1="30" x2="30" y2="30" stroke="#4ea846" stroke-width="1.8" stroke-linecap="round"/>
    <!-- antenna -->
    <line x1="22" y1="-2" x2="22" y2="2" stroke="#0d1f17" stroke-width="1.6"/>
    <circle cx="22" cy="-4" r="2" fill="#4ea846"/>
  </g>
  <text x="62" y="148" font-family="IBM Plex Mono, monospace" font-size="9" fill="#6b7a73" text-anchor="middle">agent</text>

  <!-- arrow -->
  <g transform="translate(112, 100)">
    <line x1="0" y1="0" x2="38" y2="0" stroke="#1f7a36" stroke-width="1.4" stroke-dasharray="4 4"/>
    <polygon points="38,-3 44,0 38,3" fill="#1f7a36"/>
    <text x="22" y="-10" font-family="IBM Plex Mono, monospace" font-size="8" fill="#1f7a36" text-anchor="middle">plan</text>
  </g>

  <!-- method nodes -->
  <g transform="translate(170, 70)">
    <rect width="80" height="22" rx="5" fill="#ffffff" stroke="#c2d4c8"/>
    <text x="8" y="14" font-family="IBM Plex Mono, monospace" font-size="9" fill="#0d1f17">ov.tl.<tspan fill="#1f7a36">cluster</tspan></text>
    <rect x="0" y="28" width="80" height="22" rx="5" fill="#ffffff" stroke="#c2d4c8"/>
    <text x="8" y="42" font-family="IBM Plex Mono, monospace" font-size="9" fill="#0d1f17">ov.tl.<tspan fill="#1f7a36">annotate</tspan></text>
    <rect x="0" y="56" width="80" height="22" rx="5" fill="#1f7a36"/>
    <text x="8" y="70" font-family="IBM Plex Mono, monospace" font-size="9" fill="#ffffff">ov.pl.<tspan fill="#7cc46a">embed</tspan></text>
  </g>
  <text x="210" y="170" font-family="IBM Plex Mono, monospace" font-size="9" fill="#6b7a73" text-anchor="middle">methods · skills</text>

  <!-- arrow -->
  <g transform="translate(258, 100)">
    <line x1="0" y1="0" x2="38" y2="0" stroke="#1f7a36" stroke-width="1.4" stroke-dasharray="4 4"/>
    <polygon points="38,-3 44,0 38,3" fill="#1f7a36"/>
    <text x="22" y="-10" font-family="IBM Plex Mono, monospace" font-size="8" fill="#1f7a36" text-anchor="middle">inspect</text>
  </g>

  <!-- report -->
  <g transform="translate(308, 64)">
    <rect width="58" height="76" rx="6" fill="#ffffff" stroke="#c2d4c8"/>
    <text x="6" y="14" font-family="IBM Plex Mono, monospace" font-size="7" fill="#6b7a73">REPORT</text>
    <line x1="6" y1="20" x2="52" y2="20" stroke="#e1ebe4"/>
    <line x1="6" y1="28" x2="48" y2="28" stroke="#c2d4c8"/>
    <line x1="6" y1="34" x2="52" y2="34" stroke="#c2d4c8"/>
    <rect x="6" y="42" width="46" height="20" fill="#e6f3e1"/>
    <g transform="translate(8, 46)" fill="#1f7a36">
      <rect x="0" y="10" width="5" height="6"/>
      <rect x="7" y="6" width="5" height="10"/>
      <rect x="14" y="2" width="5" height="14"/>
      <rect x="21" y="8" width="5" height="8"/>
      <rect x="28" y="4" width="5" height="12"/>
      <rect x="35" y="10" width="5" height="6"/>
    </g>
    <line x1="6" y1="68" x2="40" y2="68" stroke="#c2d4c8"/>
  </g>
  <text x="338" y="156" font-family="IBM Plex Mono, monospace" font-size="9" fill="#6b7a73" text-anchor="middle">report</text>

  <!-- back loop arrow (feedback) -->
  <g fill="none" stroke="#4ea846" stroke-width="1" stroke-dasharray="2 3" opacity="0.6">
    <path d="M 338 64 Q 340 28 200 28 Q 60 28 62 70"/>
    <polygon points="62,68 60,72 65,72" fill="#4ea846" stroke="none"/>
  </g>
  <text x="200" y="22" font-family="IBM Plex Mono, monospace" font-size="7" fill="#4ea846" text-anchor="middle" opacity="0.9">feedback loop</text>
</svg>
